<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>VKR • OFFLINE App (Login + Rolės)</title>
<style>
  :root{
    --bg:#f6f7fb;--card:#fff;--muted:#6b7280;--text:#111827;--primary:#0ea5e9;
    --green:#10b981;--red:#ef4444;--amber:#f59e0b;--border:#e5e7eb;--rounded:14px;
    --danger-bg:#fff5f5;--danger-b:#fecaca;
  }
  *{box-sizing:border-box}

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:
      linear-gradient(

  }

    border:2px solid #ef4444 !important;
  }
  .req-miss .muted{
    color:#b91c1c !important;
    font-weight:700;
  }

    .container{max-width:1200px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--rounded);padding:14px;margin-bottom:12px}
    .row{display:grid;gap:12px}
    .row-2{grid-template-columns:1fr 1fr}
    .row-3{grid-template-columns:repeat(3,1fr)}
    .row-4{grid-template-columns:repeat(4,1fr)}
    select,input,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:#fff}
    textarea{min-height:90px}
    .btn{display:inline-block;border:1px solid var(--border);background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer}
    .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn.green{background:var(--green);color:#fff;border-color:var(--green)}
    .btn.red{background:var(--red);color:#fff;border-color:#dc2626}
    .btn.amber{background:var(--amber);color:#111827;border-color:#d97706}
    .muted{color:var(--muted)}
    .right{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
    .headerline{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .hidden{display:none}
    .btn.pressed{outline:2px solid #0ea5e9}
    .pill{display:inline-block;background:#e5f3ff;color:#075985;border:1px solid #bae6fd;border-radius:999px;padding:2px 8px;font-size:12px}
    .danger{background:var(--danger-bg);border-color:var(--danger-b)}
    .blink { animation: blink 1s infinite; }
    @keyframes blink {
      0%,50% { box-shadow:0 0 0 0 rgba(239,68,68,0); }

    }
    .alarm{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 10px;border-radius:999px;
      border:1px solid #fecaca;background:#fff5f5;color:#b91c1c;
      font-weight:700;font-size:13px;
    }
    table{width:100%;border-collapse:collapse}
    th,td{border-top:1px solid var(--border);padding:8px;text-align:left;font-size:14px;vertical-align:top}
    thead th{border-top:0;color:var(--muted)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tabs .btn{border-radius:999px}
    .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .kpi .card{padding:10px;text-align:center}
    .kpi h2{margin:6px 0 0 0}
    @media (max-width:900px){
      .row-3{grid-template-columns:1fr}
      .row-4{grid-template-columns:1fr}
      .kpi{grid-template-columns:1fr 1fr}

    .alarm{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 10px;border-radius:999px;
      border:1px solid #fecaca;background:#fff5f5;color:#b91c1c;
      font-weight:700;font-size:13px;
    }

    .modal.hidden { display:none; }
    .modal {
      position:fixed; left:0; top:0; width:100%; height:100%;
      background:rgba(0,0,0,0.45); display:flex; justify-content:center; align-items:center;
      z-index:9999;
    }
    .modal-content{
      background:#fff; padding:20px; width:400px; border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
    }
    #ntTitle,#ntComment,#ntMechs{
      width:100%; padding:8px; border:1px solid #ccc; border-radius:8px;
    }
    #ntComment{ height:80px; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://avrjslhjckekhjuitkuo.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Q57UTc8C3EVY5zIoldLcxQ_e_niNb5p";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const DB_KEY = 'vkr_app_db_v1';
const ONLINE = false;
const SYNC_EVERY_MS = 5000;


/* helpers */
async function loadTasksFromSupabase(){
  const { data, error } = await sb
    .from('tasks')
    .select('*')
    .order('created_at', { ascending: false });

  if(error){
    console.error('Klaida gaunant tasks:', error);
    return [];
  }

  return (data || []).map(t => ({
    id: t.id,
    equipId: t.equip_id,
    title: t.title,
    status: t.status,
    assignedTo: Array.isArray(t.assigned_to) ? t.assigned_to : [],
    shared: !!t.shared,
    source: t.source || '',
    createdAt: t.created_at ? new Date(t.created_at).getTime() : Date.now(),
    initialComment: t.initial_comment || '',
    fromNoteId: t.from_note_id || null,
    seenBy: t.seen_by || {},
    progressLog: Array.isArray(t.progress_log) ? t.progress_log : []
  }));
}
async function loadUsersFromSupabase(){
  const { data, error } = await sb
    .from('users')
    .select('*')
    .order('name', { ascending: true });

  if(error){
    console.error('Klaida gaunant users:', error);
    return [];
  }

  return (data || []).map(u => ({
    id: u.id,
    username: u.username,
    display: u.name || u.username,
    role: u.role,
    password: u.password
  }));
}
async function updateTaskInSupabase(taskId, updates){
  const payload = {};

  if(updates.equipId !== undefined) payload.equip_id = updates.equipId;
  if(updates.title !== undefined) payload.title = updates.title;
  if(updates.status !== undefined) payload.status = updates.status;
  if(updates.assignedTo !== undefined) payload.assigned_to = updates.assignedTo;
  if(updates.shared !== undefined) payload.shared = updates.shared;
  if(updates.source !== undefined) payload.source = updates.source;
  if(updates.initialComment !== undefined) payload.initial_comment = updates.initialComment;
  if(updates.fromNoteId !== undefined) payload.from_note_id = updates.fromNoteId;
  if(updates.seenBy !== undefined) payload.seen_by = updates.seenBy;
  if(updates.progressLog !== undefined) payload.progress_log = updates.progressLog;

  const { data, error } = await sb
    .from('tasks')
    .update(payload)
    .eq('id', taskId)
    .select()
    .single();

  if(error){
    console.error('Klaida atnaujinant task:', error);
    return null;
  }

  return {
    id: data.id,
    equipId: data.equip_id,
    title: data.title,
    status: data.status,
    assignedTo: Array.isArray(data.assigned_to) ? data.assigned_to : [],
    shared: !!data.shared,
    source: data.source || '',
    createdAt: data.created_at ? new Date(data.created_at).getTime() : Date.now(),
    initialComment: data.initial_comment || '',
    fromNoteId: data.from_note_id || null,
    seenBy: data.seen_by || {},
    progressLog: Array.isArray(data.progress_log) ? data.progress_log : []
  };
}

async function boot(){
  db = loadDB();
  if(!db){
    db = seedDB();
    saveDB_local(db);
  }

  const usersFromCloud = await loadUsersFromSupabase();
  if(usersFromCloud.length){
    db.users = usersFromCloud;
  }

  const tasksFromCloud = await loadTasksFromSupabase();
  if(tasksFromCloud.length){
    db.tasks = tasksFromCloud;
  }

  saveDB_local(db);
  render();
}

async function createTaskInSupabase(task){
  const payload = {
    equip_id: task.equipId,
    title: task.title,
    status: task.status || 'Nauja',
    assigned_to: task.assignedTo || [],
    shared: !!task.shared,
    source: task.source || 'admin',
    initial_comment: task.initialComment || null,
    from_note_id: task.fromNoteId || null,
    seen_by: task.seenBy || {},
    progress_log: task.progressLog || []
  };

  const { data, error } = await sb
    .from('tasks')
    .insert([payload])
    .select()
    .single();

  if(error){
    console.error('Klaida kuriant task:', error);
    return null;
  }

  return {
    id: data.id,
    equipId: data.equip_id,
    title: data.title,
    status: data.status,
    assignedTo: Array.isArray(data.assigned_to) ? data.assigned_to : [],
    shared: !!data.shared,
    source: data.source || '',
    createdAt: data.created_at ? new Date(data.created_at).getTime() : Date.now(),
    initialComment: data.initial_comment || '',
    fromNoteId: data.from_note_id || null,
    seenBy: data.seen_by || {},
    progressLog: Array.isArray(data.progress_log) ? data.progress_log : []
  };
}
function rid(){ return 'id'+Math.random().toString(16).slice(2)+Math.random().toString(16).slice(2); }
function today(){ const d=new Date(); return d.toISOString().slice(0,10); }
function nowHM(){ const d=new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
function parentOfAsset(assetId){
  if(!db || !Array.isArray(db.grabs)) return '—';
  const g = db.grabs.find(x => x && x.id === assetId);
  if(!g) return '—';
  return g.parentEquipId ? labelEquip(g.parentEquipId) : '—';
}
function taskSortKey(t){ return t.createdAt || t.startedAt || 0; }
function sortNewestFirst(arr){ return (arr||[]).slice().sort((a,b)=>taskSortKey(b)-taskSortKey(a)); }
function seenInfo(t){
  const ids = t.seenBy ? Object.keys(t.seenBy) : [];
  if(!ids.length) return 'Nematė niekas';
  return 'Matė: ' + ids.map(uid => userDisplay(uid)+' ('+fmt(t.seenBy[uid])+')').join(', ');
}
function isSeen(t, userId){
  return !!(t.seenBy && t.seenBy[userId]);
}
function mechanicVisibleTasks(userId){
  return (db.tasks||[]).filter(t=>{
    const active = (t.status==='Nauja' || t.status==='Vykdoma');
    return active;
  });
}
function unseenForMechanic(userId){
  return mechanicVisibleTasks(userId).filter(t=>!isSeen(t,userId));
}
function labelAssetForSelect(assetId){
  if(!db || !Array.isArray(db.grabs)) return labelEquip(assetId);
  const g = db.grabs.find(x => x && x.id === assetId);
  if(!g) return labelEquip(assetId);
  const parent = g.parentEquipId ? labelEquip(g.parentEquipId) : '—';
  return `${g.label || g.id} (priskirta: ${parent})`;
}
function fmt(dt){
  if(!dt) return '—';
  const x=new Date(dt);
  if(isNaN(x*1)) return dt;
  const y=x.getFullYear(), m=('0'+(x.getMonth()+1)).slice(-2), d=('0'+x.getDate()).slice(-2),
        hh=('0'+x.getHours()).slice(-2), mm=('0'+x.getMinutes()).slice(-2);
  return `${y}-${m}-${d} ${hh}:${mm}`;
}
function fmtMinutes(min){
  if(min===null || min===undefined || isNaN(min)) return '—';
  const h=Math.floor(min/60), m=min%60;
  if(h<=0) return `${m} min`;
  return `${h} val. ${m} min`;
}
function safeTrim(s){ return (s||'').toString().trim(); }
function escapeHtml(s){
  return (s||'').toString()
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'","&#039;");
}

/* db */
async function apiGetDB(){
  const r = await fetch(API_URL, { method:'GET', cache:'no-store' });
  const txt = await r.text();
  return JSON.parse(txt || '{}');
}

async function apiSaveDB(dbObj){
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify(dbObj)
  });
  return r.json().catch(()=>({ok:true}));
}

// ===== local + online wrapper =====
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){
    return null;
  }
}

function saveDB_local(dbObj){
  localStorage.setItem(DB_KEY, JSON.stringify(dbObj));
}

// Kad nereikėtų perrašinėti viso tavo kodo (kur kviečia saveDB(db)):
async function saveDB(dbObj){
  // visada išsisaugom lokaliai (kad veiktų offline)
  saveDB_local(dbObj);

  // jei online įjungtas – siunčiam į serverį
  if(ONLINE){
    try{ await apiSaveDB(dbObj); }catch(e){ /* tyli klaida */ }
  }
}

let db = null;



/* realtime sync */
window.addEventListener('storage', (e)=>{
  if(e.key===DB_KEY){
    const newer=loadDB();
    if(newer){ db=newer; render(); }
  }
});

/* derived */
function currentUser(){
  if(!db) return null;
  if(db.session && db.session.currentUser && db.session.currentUser.id === db.session.userId){
    return db.session.currentUser;
  }
  return (db.users || []).find(u => u.id === db.session.userId) || null;
}

function userDisplay(uid){
  const u = db.users.find(x => x.id === uid);
  return u ? (u.display || u.username) : '(nenurodyta)';
}
function usersByRole(role){ return db.users.filter(u=>u.role===role); }
function labelEquip(eid){
  const e = db.equipment.find(x=>x.id===eid);
  if(e) return `${e.type||'Technika'}${e.num?(' Nr. '+e.num):''}`;

  const g = (db.grabs||[]).find(x=>x.id===eid);
  if(g) return g.label || eid;

  return eid;
}

function setSessionUser(userId){ db.session.userId=userId; saveDB(db); }
function logout(){ setSessionUser(null); render(); }

/* auth */
async function doLogin(username, password){
  try{
    const { data, error } = await sb
      .from('users')
      .select('*')
      .eq('username', username)
      .eq('password', password)
      .maybeSingle();

    if(error){
      console.error('Login klaida:', error);
      return { ok:false, msg:'DB klaida prisijungiant.' };
    }

    if(!data){
      return { ok:false, msg:'Neteisingas vartotojas arba slaptažodis.' };
    }

const normalizedUser = {
  id: data.id,
  username: data.username,
  display: data.name || data.username,
  role: data.role,
  password: data.password
};

db.session.userId = normalizedUser.id;
db.session.currentUser = normalizedUser;

const existingIdx = (db.users || []).findIndex(u => u.id === normalizedUser.id);
if(existingIdx >= 0){
  db.users[existingIdx] = normalizedUser;
} else {
  db.users.push(normalizedUser);
}

saveDB_local(db);

    return { ok:true, user:data };
  }catch(err){
    console.error(err);
    return { ok:false, msg:'Nepavyko prisijungti.' };
  }
}

/* UI helpers */
function tabBtn(key,label,active){
  const cls='btn'+(key===active?' primary':'');
  return `<button class="${cls}" data-tab="${key}">${label}</button>`;
}

function changePasswordUI(user){
  return `
    <div class="card">
      <div class="headerline">
        <h3 style="margin:0">Slaptažodis</h3>
        <span class="pill">${escapeHtml(user.display||user.username)} • ${escapeHtml(user.role)}</span>
      </div>
      <div class="row row-3" style="margin-top:8px">
        <div><div class="muted">Dabartinis</div><input id="pwOld" type="password"></div>
        <div><div class="muted">Naujas</div><input id="pwNew" type="password"></div>
        <div><div class="muted">Pakartoti</div><input id="pwNew2" type="password"></div>
      </div>
      <div class="right" style="margin-top:8px">
        <button class="btn" id="pwSave">Išsaugoti</button>
      </div>
      <div class="muted" style="font-size:12px" id="pwMsg"></div>
    </div>`;
}
function bindChangePassword(user){
  const b=document.getElementById('pwSave');
  if(!b) return;
  b.onclick=()=>{
    const oldv=safeTrim(document.getElementById('pwOld').value);
    const nv1=safeTrim(document.getElementById('pwNew').value);
    const nv2=safeTrim(document.getElementById('pwNew2').value);
    const msg=document.getElementById('pwMsg');
    msg.textContent='';
    if(oldv!==user.password){ msg.textContent='Dabartinis slaptažodis neteisingas.'; return; }
    if(!nv1 || nv1.length<4){ msg.textContent='Naujas slaptažodis per trumpas (min 4).'; return; }
    if(nv1!==nv2){ msg.textContent='Nauji slaptažodžiai nesutampa.'; return; }
    const idx=db.users.findIndex(x=>x.id===user.id);
    db.users[idx].password=nv1;
    saveDB(db);
    msg.textContent='Slaptažodis pakeistas.';
    document.getElementById('pwOld').value='';
    document.getElementById('pwNew').value='';
    document.getElementById('pwNew2').value='';
  };
}

/* render router */
function render(){
  const root = document.getElementById('app');
  if(!root) return;

  if(!db){
    root.innerHTML = '<div class="card">Kraunama...</div>';
    return;
  }

  const u = currentUser();
  if(!u){
    root.innerHTML = renderLogin();
    bindLogin();
    return;
  }

  if(u.role === 'admin') renderAdmin(root, u);
  else if(u.role === 'operator') renderOperator(root, u);
  else renderMechanic(root, u);
}

/* login */
function renderLogin(){
  return `
    <div class="card" style="max-width:520px;margin:40px auto">
      <div style="text-align:center;margin-bottom:14px">
     <img src="img/logo.png" style="height:70px">
     </div>
      <h2 style="margin:0 0 6px 0">VKR • Prisijungimas</h2>
      <div class="muted">Prisijunk, ir atsidarys tavo rolės langas.</div>
      <div class="row" style="margin-top:12px">
        <div><div class="muted">Vartotojas</div><input id="lgUser" placeholder="pvz. admin"></div>
        <div><div class="muted">Slaptažodis</div><input id="lgPass" type="password" placeholder="••••••"></div>
        <div class="right"><button class="btn primary" id="lgBtn">Prisijungti</button></div>
        <div class="muted" style="font-size:12px" id="lgMsg"></div>
        <div class="card" style="background:#fff;border-style:dashed">
          <div class="muted" style="font-size:12px">Demo:</div>
          <div style="font-size:13px">
            <div><b>admin</b> / 123</div>
            <div><b>sarunas</b> / 123</div>
            <div><b>vaidotas</b> / 123</div>
          </div>
        </div>
      </div>
    </div>`;
}
function bindLogin(){
  const u = document.getElementById('lgUser');
  const p = document.getElementById('lgPass');
  const b = document.getElementById('lgBtn');
  const msg = document.getElementById('lgMsg');

  async function go(){
    msg.textContent = 'Jungiamasi...';

    const res = await doLogin(
      safeTrim(u.value),
      safeTrim(p.value)
    );

    if(!res.ok){
      msg.textContent = res.msg || 'Klaida.';
      return;
    }

    msg.textContent = '';
    render();
  }

  b.onclick = go;
  p.addEventListener('keydown', async (e)=>{
    if(e.key === 'Enter') await go();
  });
}

  let mid = '';
  if(view==='dashboard') mid = adminDashboard();
  else if(view==='lube') mid = adminLube();
  else if(view==='tasks') mid = adminTasks();
  else if(view==='approvals') mid = adminApprovals();
  else if(view==='notes') mid = adminNotes(user);
  else if(view==='users') mid = adminUsers();
  else if(view==='equip') mid = adminEquip();
  else if(view==='grabs') mid = adminGrabs();
  else if(view==='password') mid = changePasswordUI(user);
  else if(view==='history') mid = adminHistory();

  root.innerHTML = tabs + mid;

  document.getElementById('logout').onclick = logout;

  document.querySelectorAll('[data-tab]').forEach(b=>{
    b.onclick = ()=>{ 
      db.session.adminView = b.getAttribute('data-tab'); 
      saveDB(db); 
      render(); 
    };
  });

  if(view==='users') bindAdminUsers();
  if(view==='equip') bindAdminEquip();
  if(view==='tasks') bindAdminTasks();
  if(view==='approvals') bindAdminApprovals();
  if(view==='notes') bindAdminNotes(user);
  if(view==='password') bindChangePassword(user);
  if(view==='lube') bindAdminLube();
  if(view==='grabs') bindAdminGrabs();
  if(view==='history') bindAdminHistory();
}

function adminLube(){

  if(!db.grabs) db.grabs = [];

  const eqOpts = (db.equipment||[])
    .map(e=>`<option value="${e.id}">${escapeHtml(labelEquip(e.id))}</option>`)
    .join('');

  const grabOpts = (db.grabs||[])
    .map(g=>`<option value="${g.id}">${escapeHtml(labelAssetForSelect(g.id))}</option>`)
    .join('');

  const assetOpts = `
    <optgroup label="Technika">
      ${eqOpts || '<option disabled>(nėra technikos)</option>'}
    </optgroup>
    <optgroup label="Greiferiai / įrankiai">
      ${grabOpts || '<option disabled>(nėra greiferių)</option>'}
    </optgroup>
  `;

  const all = [];
  Object.keys(db.lube).forEach(assetId=>{
    (db.lube[assetId]||[]).forEach(rec=> all.push({assetId, ...rec}));
  });
  all.sort((a,b)=> (a.date<b.date ? 1 : -1));

  const rows = all.map(r=>`
    <tr>
      <td>${escapeHtml(labelEquip(r.assetId) || r.assetId)}</td>
      <td>${escapeHtml(parentOfAsset(r.assetId))}</td>
      <td>${escapeHtml(r.date || '—')}</td>
      <td>${escapeHtml(r.by || '—')}</td>
      <td>${escapeHtml(r.note || '—')}</td>
    </tr>
  `).join('') || `<tr><td colspan="5" class="muted">Įrašų dar nėra</td></tr>`;

  return `
    <div class="card">
      <div class="headerline">
        <h3 style="margin:0">Tepimai (peržiūra)</h3>
      </div>

      <div class="row row-3" style="margin-top:8px">
        <div>
          <div class="muted">Technika / įrankis</div>
          <select id="aLubeFilter">
            <option value="all">Visa technika / visi įrankiai</option>
            ${assetOpts}
          </select>
        </div>
        <div>
          <div class="muted">Nuo datos</div>
          <input type="date" id="aLubeFrom">
        </div>
        <div>
          <div class="muted">Iki datos</div>
          <input type="date" id="aLubeTo">
        </div>
      </div>

      <div class="right" style="margin-top:6px">
        <button class="btn" id="aLubeClear" type="button">Išvalyti</button>
        <button class="btn primary" id="aLubeApply" type="button">Filtruoti</button>
      </div>

      <table style="margin-top:10px">
        <thead>
          <tr>
            <th>Objektas</th>
            <th>Priskirta technikai</th>
            <th>Data</th>
            <th>Kas teipė</th>
            <th>Pastaba</th>
          </tr>
        </thead>
        <tbody id="aLubeBody">${rows}</tbody>
      </table>

      <div class="muted" style="margin-top:8px;font-size:12px">
        Rodoma iš db.lube (tą pildo mechanikai).
      </div>
    </div>`;
}
function bindAdminLube(){
  const sel    = document.getElementById('aLubeFilter');
  const fromEl = document.getElementById('aLubeFrom');
  const toEl   = document.getElementById('aLubeTo');
  const body   = document.getElementById('aLubeBody');
  const apply  = document.getElementById('aLubeApply');
  const clear  = document.getElementById('aLubeClear');

  if(!body) return;

  function allRows(){
    const arr=[];
    Object.keys(db.lube||{}).forEach(assetId=>{
      (db.lube[assetId]||[]).forEach(rec=> arr.push({assetId, ...rec}));
    });
    arr.sort((a,b)=> (a.date<b.date ? 1 : -1));
    return arr;
  }

  function renderRows(rows){
    body.innerHTML = rows.map(r=>`
      <tr>
        <td>${escapeHtml(labelEquip(r.assetId) || r.assetId)}</td>
        <td>${escapeHtml(parentOfAsset(r.assetId))}</td>
        <td>${escapeHtml(r.date || '—')}</td>
        <td>${escapeHtml(r.by || '—')}</td>
        <td>${escapeHtml(r.note || '—')}</td>
      </tr>
    `).join('') || `<tr><td colspan="5" class="muted">Įrašų dar nėra</td></tr>`;
  }

  function applyFilter(){
    const f    = sel    ? sel.value : 'all';
    const from = fromEl ? fromEl.value : '';
    const to   = toEl   ? toEl.value   : '';

    const rows = allRows().filter(r=>{
      if(f !== 'all' && r.assetId !== f) return false;
      if(from && (!r.date || r.date < from)) return false;
      if(to   && (!r.date || r.date > to))   return false;
      return true;
    });

    renderRows(rows);
  }

  if(apply) apply.onclick = applyFilter;

  if(clear) clear.onclick = ()=>{
    if(sel) sel.value = 'all';
    if(fromEl) fromEl.value = '';
    if(toEl) toEl.value = '';
    renderRows(allRows());
  };

  if(sel) sel.onchange = applyFilter;
}

function bindAdminGrabs(){
  if(!db.grabs) db.grabs=[];

  const idEl = document.getElementById('gId');
  const labelEl = document.getElementById('gLabel');
  const equipEl = document.getElementById('gEquip');
  const msgEl = document.getElementById('gMsg');

  function clear(){
    idEl.value='';
    labelEl.value='';
    if(equipEl && equipEl.options.length) equipEl.selectedIndex=0;
    msgEl.textContent='';
  }

  document.getElementById('gClear').onclick = clear;

  document.getElementById('gSave').onclick = ()=>{
    msgEl.textContent='';

    const id = safeTrim(idEl.value);
    const label = safeTrim(labelEl.value);
    const parentEquipId = equipEl ? equipEl.value : '';

    if(!label){ msgEl.textContent='Reikia pavadinimo.'; return; }
    if(!parentEquipId){ msgEl.textContent='Reikia priskirti technikai.'; return; }

    if(id){
      const g = db.grabs.find(x=>x.id===id);
      if(!g){ msgEl.textContent='Greiferis nerastas.'; return; }
      g.label = label;
      g.parentEquipId = parentEquipId;
      msgEl.textContent='Atnaujinta.';
    }else{
      db.grabs.push({
        id: 'gr-'+rid(),
        label,
        parentEquipId
      });
      msgEl.textContent='Pridėta.';
    }

    saveDB(db);
    render();
  };

  document.querySelectorAll('[data-g-edit]').forEach(b=>{
    b.onclick=()=>{
      const id=b.getAttribute('data-g-edit');
      const g=db.grabs.find(x=>x.id===id);
      if(!g) return;
      idEl.value=g.id;
      labelEl.value=g.label||'';
      if(equipEl) equipEl.value=g.parentEquipId||'';
      msgEl.textContent='Redaguoji: '+(g.label||g.id);
    };
  });

  document.querySelectorAll('[data-g-del]').forEach(b=>{
    b.onclick=()=>{
      const id=b.getAttribute('data-g-del');
      const g=db.grabs.find(x=>x.id===id);
      if(!g) return;
      if(!confirm('Trinti greiferį: '+(g.label||g.id)+'?')) return;

      db.grabs = db.grabs.filter(x=>x.id!==id);

      saveDB(db);
      render();
    };
  });
}

function bindAdminUsers(){

  const rEl=document.getElementById('uRole');
  const pEl=document.getElementById('uPass');

  function clear(){ idEl.value=''; dEl.value=''; unEl.value=''; rEl.value='operator'; pEl.value=''; msg.textContent=''; }
  document.getElementById('uClear').onclick=clear;

  document.getElementById('uSave').onclick=()=>{
    msg.textContent='';
    const id=safeTrim(idEl.value);
    const display=safeTrim(dEl.value);
    const username=safeTrim(unEl.value);
    const role=rEl.value;
    const pass=safeTrim(pEl.value);

    if(!username){ msg.textContent='Reikia username.'; return; }
    if(!display){ msg.textContent='Reikia vardo.'; return; }
    if(!id && !pass){ msg.textContent='Naujam naudotojui reikia slaptažodžio.'; return; }

    const clash=db.users.find(u=>u.username===username && u.id!==id);
    if(clash){ msg.textContent='Toks username jau yra.'; return; }

    if(id){
      const idx=db.users.findIndex(u=>u.id===id);
      if(idx<0){ msg.textContent='Naudotojas nerastas.'; return; }
      db.users[idx].display=display;
      db.users[idx].username=username;
      db.users[idx].role=role;
      if(pass) db.users[idx].password=pass;
    }else{
      db.users.push({ id:'u-'+rid(), display, username, role, password:pass });
    }
    saveDB(db);
    clear();
    render();
  };

  document.querySelectorAll('[data-edit-user]').forEach(b=>{
    b.onclick=()=>{
      const id=b.getAttribute('data-edit-user');
      const u=db.users.find(x=>x.id===id);
      if(!u) return;
      idEl.value=u.id; dEl.value=u.display||''; unEl.value=u.username||''; rEl.value=u.role||'operator'; pEl.value='';
      msg.textContent='Redaguoji: '+(u.display||u.username);
    };
  });
  document.querySelectorAll('[data-del-user]').forEach(b=>{
    b.onclick=()=>{
      const id=b.getAttribute('data-del-user');
      const u=db.users.find(x=>x.id===id);
      if(!u) return;
      if(!confirm('Trinti '+(u.display||u.username)+'?')) return;
      db.users=db.users.filter(x=>x.id!==id);
      db.tasks.forEach(t=>{ t.assignedTo=(t.assignedTo||[]).filter(uid=>uid!==id); });
      saveDB(db);
      render();
    };
  });
}

function bindAdminTasks(){

  if(eqSearch && eqSelect){
    const allOpts = Array.from(eqSelect.options).map(o => ({

    }));

    function applyEquipFilter(){
      const q = (eqSearch.value || '').trim().toLowerCase();

      eqSelect.innerHTML = '';
      allOpts
        .filter(o => !q || o.text.toLowerCase().includes(q))
        .forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.value;
          opt.textContent = o.text;
          eqSelect.appendChild(opt);
        });

      if(eqSelect.options.length) eqSelect.selectedIndex = 0;

      const title = safeTrim(document.getElementById('tTitle').value) || 'Užduotis';

      const sel = document.getElementById('tAssign');
      let assignedTo = [];

      if(!shared && sel){
        for(let i=0; i<sel.options.length; i++){
          if(sel.options[i].selected) assignedTo.push(sel.options[i].value);
        }
      }

      const newTask = {
        equipId,
        title,
        status: 'Nauja',
        assignedTo,
        shared,
        source: 'admin',
        createdAt: Date.now()
      };

      createTaskInSupabase(newTask).then(savedTask => {

        saveDB_local(db);

  document.querySelectorAll('[data-st]').forEach(b=>{
    b.onclick = ()=>{
      const [id, st] = b.getAttribute('data-st').split('|');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      updateTaskInSupabase(t.id, {
        status: st,
        progressLog: t.progressLog || [],
        seenBy: t.seenBy || {}
      }).then(updatedTask => {
        if(!updatedTask){
          alert('Nepavyko atnaujinti statuso');
          return;
        }

        const idx = db.tasks.findIndex(x => x.id === t.id);
        if(idx >= 0) db.tasks[idx] = updatedTask;

        saveDB_local(db);
        render();
      });
    };
  });

  document.querySelectorAll('[data-finish]').forEach(b=>{
    b.onclick = ()=>{
      const id = b.getAttribute('data-finish');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      t.status = 'Laukia patvirtinimo';
      db.approvals.unshift({
        id: rid(),
        taskId: t.id,
        equipId: t.equipId,
        issue: t.title,
        date: today(),
        reportedAt: t.reportedAt,
        doneAt: Date.now(),
        doneBy: 'Admin',
        doneById: 'u-admin',
        role: 'admin',
        comment: '',
        helpers: []
      });

      saveDB(db);
      render();
    };
  });
}

function historyCards(items){
  const sorted = items.slice().sort((a,b)=> (a.date||'') < (b.date||'') ? 1 : -1);

  return sorted.map(c=>{
    const baseInfo = `
      <div class="muted">${escapeHtml(labelEquip(c.equipId))} • ${escapeHtml(c.date||'')}</div>
      <b>${escapeHtml(c.title||'')}</b>

        ${c.durationMin ? ' • Trukmė: '+escapeHtml(fmtMinutes(c.durationMin)) : ''}
      </div>
      ${c.comment ? `<div style="margin-top:4px">${escapeHtml(c.comment||'')}</div>` : ''}
      ${(c.helpers||[]).length
        ? `<div class="muted" style="font-size:12px;margin-top:2px">Padėjo: ${escapeHtml(c.helpers.map(userDisplay).join(', '))}</div>`
        : ''
      }
    `;
    const prog = c.progressLog || [];
    const progHtml = prog.length ? `
      <div class="muted" style="margin-top:6px;font-size:12px">
        Komentarų istorija:
        ${prog.map(p=>`
          <div>• ${escapeHtml(p.date||'')} — ${escapeHtml(p.byName||'')} : ${escapeHtml(p.text||'')}</div>
        `).join('')}
      </div>
    ` : '';
    return `<div class="card">${baseInfo}${progHtml}</div>`;
  }).join('');
}

function bindAdminHistory(){
  const eqSel = document.getElementById('hEquip');
  const fromEl = document.getElementById('hFrom');
  const toEl   = document.getElementById('hTo');
  const body   = document.getElementById('hBody');
  const fBtn   = document.getElementById('hFilter');
  const cBtn   = document.getElementById('hClear');

  if(!body) return;

  function applyFilter(){
    const eq   = eqSel ? eqSel.value : '';
    const from = fromEl ? fromEl.value : '';
    const to   = toEl ? toEl.value : '';

    let items = (db.completed || []).slice();

    items = items.filter(c=>{
      if(eq && c.equipId !== eq) return false;
      if(from && (!c.date || c.date < from)) return false;
      if(to   && (!c.date || c.date > to))   return false;
      return true;
    });

    body.innerHTML = historyCards(items);
  }

  if(fBtn) fBtn.onclick = applyFilter;

  if(cBtn){
    cBtn.onclick = ()=>{
      if(eqSel) eqSel.value = '';
      if(fromEl) fromEl.value = '';
      if(toEl) toEl.value = '';
      applyFilter();
    };
  }
}

document.getElementById('opSaveCheck').onclick = () => {
  const cards = Array.from(body.querySelectorAll('.chkCard'));
  let hasError = false;

  // 1) Patikrinam ar visi punktai pažymėti
  for (const card of cards) {
    const status = card.dataset.status || 'none';
    const idx = card.getAttribute('data-i');

    // jei nepasirinko OK/NOT OK
    if (status === 'none') {
      card.classList.add('req-miss');
      hasError = true;
      continue;
    }

    // 2) jei NOT OK – privalomas komentaras
    if (status === 'nok') {
      const ta = card.querySelector('.narea');
      const val = safeTrim(ta ? ta.value : '');
      if (!val) {
        card.classList.add('req-miss');
        hasError = true;
      }
    }
  }

  if (hasError) {
    alert('❗ Negalima išsaugoti: visi punktai turi būti pažymėti OK arba NOT OK. Jei NOT OK – būtina pastaba.');
    // nurolinam iki pirmo blogo
    const firstBad = body.querySelector('.req-miss');
    if (firstBad) firstBad.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // 3) Jei viskas OK – įrašom tik NOT OK su komentarais (kaip darai dabar)
  const fields = getChecklistForEquip(eid);
  let added = 0;

  cards.forEach(card => {
    const idx = card.getAttribute('data-i');
    const status = card.dataset.status;

    if (status === 'nok') {
      const ta = card.querySelector('.narea');
      const val = safeTrim(ta ? ta.value : '');
      const point = fields[idx] || 'Nežinomas punktas';

      db.notes.unshift({
        id: rid(),
        equipId: eid,
        date: today(),
        text: `❌ ${point} – ${val}`,
        author: (user.display || user.username),
        type: 'check',
        checklistPoint: point
      });

      added++;
    }
  });

  alert('✅ Patikra išsaugota.' + (added ? (' NOT OK įrašų: ' + added) : ''));
  db.session.opView = 'home';
  saveDB(db);
  render();
};


    return;
  }

  /* REMONTAS (operatorius) */
  if (view === 'repair') {
    const runningId = db.session.opRunningByEquip[eid] || null;
    const runningTask = runningId ? (db.tasks||[]).find(t=>t.id===runningId) : null;

    body.innerHTML = `

        <div class="muted">Trumpai aprašykite gedimą…</div>
        <textarea id="repTxt" placeholder="Pvz.: sunkiai suka, tepalas bėga…">
${escapeHtml(runningTask ? (runningTask.title || '') : '')}</textarea>

        <div class="row row-2" style="margin-top:8px">
          <div>
            <div class="muted">Pradžia (HH:MM)</div>
            <input id="repStart" placeholder="${escapeHtml(nowHM())}">
          </div>
          <div class="right" style="align-items:flex-end">
            <button class="btn" id="repStartBtn" ${runningTask ? 'disabled' : ''}>Pradėti</button>
            <button class="btn primary" id="repFinishBtn" ${runningTask ? '' : 'disabled'}>Remonto pabaiga</button>
          </div>
        </div>

        <div class="muted" style="margin-top:8px">
          ${runningTask
            ? 'Vykdomas remontas matomas mechanikams ir vadovui.'
            : 'Po „Pradėti“ remontas bus matomas mechanikams ir vadovui (raudonas, viršuje).'}
        </div>
      </div>
    `;

    document.getElementById('opBack2').onclick = () => {
      db.session.opView = 'home';
      saveDB(db);
      render();
    };

    const startBtn = document.getElementById('repStartBtn');
    const finBtn   = document.getElementById('repFinishBtn');

    if (startBtn) {
      startBtn.onclick = () => {
        const title    = safeTrim(document.getElementById('repTxt')?.value) || 'Operatoriaus remontas';
        const startVal = safeTrim(document.getElementById('repStart')?.value) || nowHM();

        const task = {
          id: rid(),
          equipId: eid,
          title,
          status: 'Vykdoma',
          source: 'op-repair',
          shared: true,
          assignedTo: [],
          startedAt: Date.now(),
          startHM: startVal
        };

        db.tasks.unshift(task);
        db.session.opRunningByEquip[eid] = task.id;

        saveDB(db);
        ensureOpReminder(eid);

        alert('Remontas pradėtas.');
        render();
      };
    }

    if (finBtn) {
      finBtn.onclick = () => {
        const taskId = db.session.opRunningByEquip[eid];
        if (!taskId) {
          alert('Remontas nepradėtas.');
          return;
        }
        const task = (db.tasks||[]).find(t=>t.id===taskId);
        if (task) task.status = 'Laukia patvirtinimo';

        db.approvals.unshift({
          id: rid(),
          taskId: taskId,
          equipId: eid,
          issue: task ? task.title : 'Remonto pabaiga',
          date: today(),
          start: (document.getElementById('repStart').value || nowHM()),
          durationMin: 30,
          doneBy: (user.display || user.username),
          role: 'operatorius',
          comment: ''
        });

        delete db.session.opRunningByEquip[eid];
        if (opReminderTimer) {
          clearInterval(opReminderTimer);
          opReminderTimer = null;
        }

        alert('Išsiųsta patvirtinimui.');
        saveDB(db);
        render();
      };
    }

    return;
  }

  /* ISTORIJA / PASTABOS */
  if (view === 'history') {
    body.innerHTML = `
      <div class="card">
        <button class="btn" id="opBack3">← Atgal</button>
        <h3>ISTORIJA / PASTABOS</h3>

        <div class="row row-2" style="margin-top:10px">
          <div>
            <div class="muted">Nauja pastaba (nebūtina)</div>
            <textarea id="newNote" placeholder="Trumpai..."></textarea>
          </div>
          <div class="right" style="align-items:flex-end">
            <button class="btn primary" id="addNote">Pridėti</button>
          </div>
        </div>

        <table style="margin-top:10px">
          <thead>
            <tr><th>Data</th><th>Gedimas / Pastaba</th><th>Kas paliko</th></tr>
          </thead>
          <tbody>${operatorNotesRows(eid)}</tbody>
        </table>
      </div>
    `;

    document.getElementById('opBack3').onclick = () => {
      db.session.opView = 'home';
      saveDB(db);
      render();
    };

    document.getElementById('addNote').onclick = () => {
      const v = (document.getElementById('newNote').value || '').trim();

/* MECH – TASKS */
function mechanicTasks(user){
  const myId = user.id;

  // VISŲ matomų užduočių sąrašas
  const allVisible = mechanicVisibleTasks(myId);

  // 1) Rūšiuojam: naujausios viršuje
  const active = sortNewestFirst(allVisible);

  // 2) Nematytos (SEEN dar nespaustos)
  const unseen = active.filter(t => !isSeen(t, myId));

  const alarmHtml = unseen.length ? `
    <div class="card danger blink" style="padding:10px">
      <div class="alarm">🚨 Nematytos užduotys: ${unseen.length}</div>
      <div class="muted" style="margin-top:6px;font-size:12px">
        Informacija. SEEN spaudžiama prie konkrečios užduoties.
      </div>
    </div>
  ` : '';

  const mechUsers = usersByRole('mechanic');

  const cards = active.length ? active.map(t=>{
    const isUnseen = !isSeen(t, myId);

    // BŪTINA: kortelės klasė – raudona + mirksėjimas jei nematyta
    const cardCls = 'card danger' + (isUnseen ? ' blink' : '');

    const helpersOptions = mechUsers
      .filter(m=>m.id!==myId)
      .map(m=>`<option value="${m.id}">${escapeHtml(m.display||m.username)}</option>`)
      .join('');

    const progress = t.progressLog || [];
    const progressHtml = progress.length ? `
      <div class="muted" style="margin-top:10px;font-size:12px">
        Ankstesni komentarai:
        ${progress.map(p => `
          <div>• ${escapeHtml(p.date)} — ${escapeHtml(p.byName)}: ${escapeHtml(p.text)}</div>
        `).join('')}
      </div>
    ` : '';

    return `
      <div class="${cardCls}">
        <div class="muted">${escapeHtml(labelEquip(t.equipId))}</div>
        <b>${escapeHtml(t.title)}</b>

        ${t.initialComment
          ? `<div class="muted" style="margin-top:4px;font-style:italic">
               Komentaras: ${escapeHtml(t.initialComment)}
             </div>`
          : ''
        }

        <div class="muted" style="margin-top:4px">
          Statusas: ${escapeHtml(t.status || '—')}
          ${isUnseen ? ' • NEMATYTA' : ''}
        </div>

        <div class="muted">
          Priskirta: ${t.shared
            ? 'Bendra visiems'
            : ((t.assignedTo||[]).map(userDisplay).join(', ')||'—')}
        </div>
        <div class="muted" style="font-size:12px">
        ${escapeHtml(seenInfo(t))}
        
      </div>
      
      ${progressHtml}

        <div style="margin-top:10px">
          <div class="muted">Komentaras (nebūtina)</div>
          <textarea class="mechComment" data-id="${t.id}" placeholder="Komentaras apie atliktą darbą…"></textarea>
        </div>

        <div style="margin-top:10px">
          <div class="muted">Padėję mechanikai (jei buvo)</div>
          <select class="helperSelect" data-id="${t.id}" multiple>
            ${helpersOptions || '<option disabled>(nėra kitų mechanikų)</option>'}
          </select>
          <div class="muted" style="font-size:12px;margin-top:2px">
            Laikyk CTRL (arba Cmd), kad pažymėtum kelis.
          </div>
        </div>

        <div class="right" style="margin-top:6px">
          <button class="btn" data-seen="${t.id}">SEEN</button>
          <button class="btn" data-st="${t.id}|Vykdoma">Vykdoma</button>
          <button class="btn green" data-done="${t.id}">Baigta (siųsti patvirtinimui)</button>
        </div>
      </div>
    `;
  }).join('') : '<div class="card muted">Aktyvių užduočių nėra</div>';

  return `
    ${alarmHtml}
    <div class="card">
      <h3 style="margin-top:0">Užduotys</h3>
      ${cards}
    </div>
  `;
}

function bindMechanicTasks(user){
  document.querySelectorAll('[data-seen]').forEach(b=>{
    b.onclick = ()=>{
      const id = b.getAttribute('data-seen');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      if(!t.seenBy) t.seenBy = {};
      t.seenBy[user.id] = Date.now();

      updateTaskInSupabase(t.id, {
        seenBy: t.seenBy
      }).then(updatedTask => {
        if(!updatedTask){
          alert('Nepavyko pažymėti SEEN');
          return;
        }

        const idx = db.tasks.findIndex(x => x.id === t.id);
        if(idx >= 0) db.tasks[idx] = updatedTask;

        saveDB_local(db);
        render();
      });
    };
  });

  document.querySelectorAll('[data-st]').forEach(b=>{
    b.onclick = ()=>{
      const [id, st] = b.getAttribute('data-st').split('|');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      if(st === 'Vykdoma'){
        const card = b.closest('.card');
        const ta = card ? card.querySelector('.mechComment') : null;
        const comment = ta ? safeTrim(ta.value) : '';

        if(comment){
          if(!t.progressLog) t.progressLog = [];
          t.progressLog.push({
            id: rid(),
            date: fmt(Date.now()),
            byId: user.id,
            byName: (user.display || user.username),
            text: comment
          });
          ta.value = '';
        }
      }

      updateTaskInSupabase(t.id, {
        status: st,
        progressLog: t.progressLog || []
      }).then(updatedTask => {
        if(!updatedTask){
          alert('Nepavyko atnaujinti užduoties');
          return;
        }

        const idx = db.tasks.findIndex(x => x.id === t.id);
        if(idx >= 0) db.tasks[idx] = updatedTask;

        saveDB_local(db);
        render();
      });
    };
  });

  document.querySelectorAll('[data-done]').forEach(b=>{
    b.onclick = ()=>{
      const id = b.getAttribute('data-done');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      const card = b.closest('.card');
      const ta = card ? card.querySelector('.mechComment') : null;
      const comment = ta ? safeTrim(ta.value) : '';

      if(comment){
        if(!t.progressLog) t.progressLog = [];
        t.progressLog.push({
          id: rid(),
          date: fmt(Date.now()),
          byId: user.id,
          byName: (user.display || user.username),
          text: comment
        });
      }

      const sel = card ? card.querySelector('.helperSelect') : null;
      const helpers = sel ? Array.from(sel.selectedOptions).map(o=>o.value) : [];

      t.status = 'Laukia patvirtinimo';

      db.approvals.unshift({
        id: rid(),
        taskId: t.id,
        equipId: t.equipId,
        issue: t.title,
        date: today(),
        start: nowHM(),
        durationMin: 30,
        doneBy: (user.display || user.username),
        doneById: user.id,
        role: 'mechanikas',
        comment: comment,
        initialComment: t.initialComment || '',
        helpers: helpers
      });

      saveDB(db);
      render();
    };
  });

  const create = document.getElementById('mCreate');
  if(create){
    create.onclick = ()=>{
      const equipId = document.getElementById('mEq').value;
      const title = safeTrim(document.getElementById('mTitle').value) || 'Užduotis';

      db.tasks.unshift({
        id: rid(),
        equipId: equipId,
        title: title,
        status: 'Nauja',
        source: 'operator-report',
        reportedBy: user.display || user.username,
        reportedAt: Date.now()
      });

      saveDB(db);
      render();
    };
  }
}

function bindMechanicNotes(user){

      <table>
        <thead><tr><th>Objektas</th><th>Priskirta technikai</th><th>Data</th><th>Kas teipė</th><th>Pastaba</th></tr></thead>
        <tbody id="mLubeBody">${lastRows}</tbody>
      </table>
    </div>
  `;

function bindMechanicLube(user){
  const btn = document.getElementById('mLubeDo');
  const fBtn = document.getElementById('lFilter');
  const cBtn = document.getElementById('lClear');

  function rebuildTable(rows){
    const body = document.getElementById('mLubeBody');
    if(!body) return;

    body.innerHTML = rows.map(r=>`
      <tr>
        <td>${escapeHtml(labelEquip(r.assetId) || r.assetId)}</td>
        <td>${escapeHtml(parentOfAsset(r.assetId))}</td>
        <td>${escapeHtml(r.date || '—')}</td>
        <td>${escapeHtml(r.by || '—')}</td>
        <td>${escapeHtml(r.note || '—')}</td>
      </tr>
    `).join('') || `<tr><td colspan="5" class="muted">Nėra įrašų</td></tr>`;
  }

  function collectAll(){
    const rows=[];
    Object.keys(db.lube||{}).forEach(assetId=>{
      (db.lube[assetId]||[]).forEach(r=> rows.push({assetId, ...r}));
    });
    rows.sort((a,b)=> (a.date < b.date ? 1 : -1));
    return rows;
  }

  if(btn){
    btn.onclick = ()=>{
      if(!db.lube) db.lube = {};

      const assetId = safeTrim(document.getElementById('mLubeAsset')?.value || '');
      const note = safeTrim(document.getElementById('mLubeNote')?.value || '');

      if(!assetId){
        alert('Pasirink objektą.');
        return;
      }

      if(!db.lube[assetId]) db.lube[assetId] = [];
      db.lube[assetId].push({
        date: today(),
        by: (user.display||user.username),
        byId: user.id,
        note
      });

      const inp = document.getElementById('mLubeNote');
      if(inp) inp.value = '';

      saveDB(db);
      rebuildTable(collectAll().slice(0,60));
    };
  }

  if(fBtn){
    fBtn.onclick = ()=>{
      const from = document.getElementById('lFrom')?.value || '';
      const to   = document.getElementById('lTo')?.value || '';

      const rows = [];
      Object.keys(db.lube||{}).forEach(assetId=>{
        (db.lube[assetId]||[]).forEach(r=>{
          if(from && r.date < from) return;
          if(to && r.date > to) return;
          rows.push({assetId, ...r});
        });
      });

      rows.sort((a,b)=> (a.date < b.date ? 1 : -1));
      rebuildTable(rows);
    };
  }

  if(cBtn){
    cBtn.onclick = ()=>{
      const f=document.getElementById('lFrom'); if(f) f.value='';
      const t=document.getElementById('lTo'); if(t) t.value='';
      rebuildTable(collectAll().slice(0,60));
    };
  }
}

setInterval(async () => {
  if(!db) return;
  if(!db.session || !db.session.userId) return;

  const usersFromCloud = await loadUsersFromSupabase();
  if(usersFromCloud.length){
    db.users = usersFromCloud;
  }

  const tasksFromCloud = await loadTasksFromSupabase();
  if(tasksFromCloud.length){
    db.tasks = tasksFromCloud;
  }

  saveDB_local(db);
  render();
}, 3000);

boot();
</script>
