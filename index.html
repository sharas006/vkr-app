async function uploadTaskFileToSupabase(file, taskId, user){
  if(!file) return null;

  const cleanName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `${taskId}/${Date.now()}_${cleanName}`;

  const { error: uploadError } = await sb
    .storage
    .from('task-files')
    .upload(path, file, {
      cacheControl: '3600',
      upsert: false
    });

  if(uploadError){
    console.error('Klaida keliant failą į Storage:', uploadError);
    alert('Nepavyko įkelti failo: ' + uploadError.message);
    return null;
  }

  const saved = await createTaskFileInSupabase({
    taskId,
    fileName: file.name,
    filePath: path,
    contentType: file.type || '',
    uploadedById: user?.id || null,
    uploadedByName: user?.display || user?.username || ''
  });

  return saved;
}

async function getTaskFileUrl(filePath){
  const { data, error } = await sb
    .storage
    .from('task-files')
    .createSignedUrl(filePath, 60 * 60);

  if(error){
    console.error('Klaida gaunant failo URL:', error);
    return null;
  }

  return data?.signedUrl || null;
}

function bindTaskFileUploads(user){
  document.querySelectorAll('[data-upload-task-file]').forEach(btn => {
    btn.onclick = async () => {
      const taskId = btn.getAttribute('data-upload-task-file');
      const input = document.querySelector(`input[data-task-file="${taskId}"]`);
      const file = input?.files?.[0];

      if(!file){
        alert('Pasirink failą.');
        return;
      }

      const saved = await uploadTaskFileToSupabase(file, taskId, user);
      if(!saved){
        alert('Nepavyko įkelti failo.');
        return;
      }

      if(!db.taskFiles) db.taskFiles = [];
      db.taskFiles.unshift(saved);

      alert('Failas įkeltas.');
      render();
    };
  });

  document.querySelectorAll('[data-open-file]').forEach(link => {
    link.onclick = async (e) => {
      e.preventDefault();

      const id = link.getAttribute('data-open-file');
      const file = (db.taskFiles || []).find(f => String(f.id) === String(id));
      if(!file) return;

      const url = await getTaskFileUrl(file.filePath);
      if(!url){
        alert('Nepavyko atidaryti failo.');
        return;
      }

      window.open(url, '_blank');
    };
  });
}

function fmt(dt){
  if(!dt) return '—';
  const x=new Date(dt);
  if(isNaN(x*1)) return dt;
  const y=x.getFullYear(), m=('0'+(x.getMonth()+1)).slice(-2), d=('0'+x.getDate()).slice(-2),
        hh=('0'+x.getHours()).slice(-2), mm=('0'+x.getMinutes()).slice(-2);
  return `${y}-${m}-${d} ${hh}:${mm}`;
}
function fmtMinutes(min){
  if(min===null || min===undefined || isNaN(min)) return '—';
  const h=Math.floor(min/60), m=min%60;
  if(h<=0) return `${m} min`;
  return `${h} val. ${m} min`;
}

  return Object.entries(map)
    .map(([equipId, items]) => ({

}

      .from('users')
      .select('*')
      .eq('username', username)
      .eq('password', password)
      .maybeSingle();

    if(error){

    }

    if(!data){
      return { ok:false, msg:'Neteisingas vartotojas arba slaptažodis.' };
    }

const normalizedUser = {
  id: data.id,
  username: data.username,
  display: data.name || data.username,
  role: data.role,
  password: data.password,
  equipId: data.equip_id || null
};

db.session.userId = normalizedUser.id;
db.session.currentUser = normalizedUser;

const existingIdx = (db.users || []).findIndex(u => u.id === normalizedUser.id);
if(existingIdx >= 0){
  db.users[existingIdx] = normalizedUser;
} else {
  db.users.push(normalizedUser);
}

saveDB_local(db);

    return { ok:true, user:data };
  }catch(err){
    console.error(err);
    return { ok:false, msg:'Nepavyko prisijungti.' };
  }
}

function bindChangePassword(user){
  const b = document.getElementById('pwSave');
  if(!b) return;

  b.onclick = async ()=>{
    const oldv = safeTrim(document.getElementById('pwOld').value);
    const nv1 = safeTrim(document.getElementById('pwNew').value);
    const nv2 = safeTrim(document.getElementById('pwNew2').value);
    const msg = document.getElementById('pwMsg');
    msg.textContent = '';

    if(oldv !== user.password){
      msg.textContent = 'Dabartinis slaptažodis neteisingas.';
      return;
    }

    if(!nv1 || nv1.length < 4){
      msg.textContent = 'Naujas slaptažodis per trumpas (min 4).';
      return;
    }

    if(nv1 !== nv2){
      msg.textContent = 'Nauji slaptažodžiai nesutampa.';
      return;
    }

    const updatedUser = await updateUserInSupabase(user.id, {
      password: nv1
    });

    if(!updatedUser){
      msg.textContent = 'Nepavyko pakeisti slaptažodžio.';
      return;
    }

    const idx = db.users.findIndex(x => x.id === user.id);
    if(idx >= 0) db.users[idx] = updatedUser;

    if(db.session?.currentUser?.id === user.id){
      db.session.currentUser = updatedUser;
    }

    msg.textContent = 'Slaptažodis pakeistas.';
    document.getElementById('pwOld').value = '';
    document.getElementById('pwNew').value = '';
    document.getElementById('pwNew2').value = '';
  };
}

function bindLogin(){
  const u = document.getElementById('lgUser');
  const p = document.getElementById('lgPass');
  const b = document.getElementById('lgBtn');
  const msg = document.getElementById('lgMsg');

  async function go(){
    msg.textContent = 'Jungiamasi...';

    const res = await doLogin(
      safeTrim(u.value),
      safeTrim(p.value)
    );

    if(!res.ok){
      msg.textContent = res.msg || 'Klaida.';
      return;
    }

    msg.textContent = '';
    render();
  }

  b.onclick = go;
  p.addEventListener('keydown', async (e)=>{
    if(e.key === 'Enter') await go();

          <input type="date" id="aLubeFrom">
        </div>
        <div>
          <div class="muted">Iki datos</div>
          <input type="date" id="aLubeTo">
        </div>

      <div class="right" style="margin-top:6px">
        <button class="btn" id="aLubeClear" type="button">Išvalyti</button>

            <th>Priskirta technikai</th>
            <th>Data</th>

      </table>

      <div class="muted" style="margin-top:8px;font-size:12px">
        Rodoma iš db.lube (tą pildo mechanikai).
      </div>
    </div>`;
}
function bindAdminLube(){
  const sel    = document.getElementById('aLubeFilter');
  const fromEl = document.getElementById('aLubeFrom');
  const toEl   = document.getElementById('aLubeTo');
  const body   = document.getElementById('aLubeBody');
  const apply  = document.getElementById('aLubeApply');
  const clear  = document.getElementById('aLubeClear');

  if(!body) return;

  function allRows(){
    const arr=[];
    Object.keys(db.lube||{}).forEach(assetId=>{
      (db.lube[assetId]||[]).forEach(rec=> arr.push({assetId, ...rec}));
    });
    arr.sort((a,b)=> (a.date<b.date ? 1 : -1));
    return arr;
  }

  function renderRows(rows){
    body.innerHTML = rows.map(r=>`
      <tr>
        <td>${escapeHtml(labelEquip(r.assetId) || r.assetId)}</td>
        <td>${escapeHtml(parentOfAsset(r.assetId))}</td>
        <td>${escapeHtml(r.date || '—')}</td>
        <td>${escapeHtml(r.by || '—')}</td>
        <td>${escapeHtml(r.note || '—')}</td>
      </tr>
    `).join('') || `<tr><td colspan="5" class="muted">Įrašų dar nėra</td></tr>`;
  }

  function applyFilter(){
    const f    = sel    ? sel.value : 'all';
    const from = fromEl ? fromEl.value : '';
    const to   = toEl   ? toEl.value   : '';

    const rows = allRows().filter(r=>{
      if(f !== 'all' && r.assetId !== f) return false;
      if(from && (!r.date || r.date < from)) return false;
      if(to   && (!r.date || r.date > to))   return false;
      return true;
    });

    renderRows(rows);
  }

  if(apply) apply.onclick = applyFilter;

  if(clear) clear.onclick = ()=>{
    if(sel) sel.value = 'all';
    if(fromEl) fromEl.value = '';
    if(toEl) toEl.value = '';
    renderRows(allRows());
  };

  if(sel) sel.onchange = applyFilter;
}

function bindAdminGrabs(){
  if(!db.grabs) db.grabs=[];

  const labelEl = document.getElementById('gLabel');
  const equipEl = document.getElementById('gEquip');
  const msgEl = document.getElementById('gMsg');

  function clear(){
    idEl.value='';
    labelEl.value='';
    if(equipEl && equipEl.options.length) equipEl.selectedIndex=0;
    msgEl.textContent='';
  }

  document.getElementById('gClear').onclick = clear;

  document.getElementById('gSave').onclick = async ()=>{
  msgEl.textContent = '';

  const id = safeTrim(idEl.value);
  const label = safeTrim(labelEl.value);
  const parentEquipId = equipEl ? equipEl.value : '';

  if(!label){ msgEl.textContent='Reikia pavadinimo.'; return; }
  if(!parentEquipId){ msgEl.textContent='Reikia priskirti technikai.'; return; }

  if(id){
    const updated = await updateGrabInSupabase(id, { label, parentEquipId });
    if(!updated){
      msgEl.textContent = 'Nepavyko atnaujinti greiferio.';
      return;
    }

    const idx = db.grabs.findIndex(x=>x.id===id);
    if(idx >= 0) db.grabs[idx] = updated;
    msgEl.textContent = 'Atnaujinta.';
  }else{
    const newGrab = {
      id: 'gr-'+rid(),
      label,
      parentEquipId
    };

    const saved = await createGrabInSupabase(newGrab);
    if(!saved){
      msgEl.textContent = 'Nepavyko sukurti greiferio.';
      return;
    }

    db.grabs.push(saved);
    msgEl.textContent = 'Pridėta.';
  }

  saveDB_local(db);
  render();
};

  document.querySelectorAll('[data-g-edit]').forEach(b=>{
    b.onclick=()=>{
      const id=b.getAttribute('data-g-edit');
      const g=db.grabs.find(x=>x.id===id);
      if(!g) return;
      idEl.value=g.id;
      labelEl.value=g.label||'';
      if(equipEl) equipEl.value=g.parentEquipId||'';
      msgEl.textContent='Redaguoji: '+(g.label||g.id);
    };
  });

  document.querySelectorAll('[data-g-del]').forEach(b=>{
  b.onclick = async ()=>{
    const id = b.getAttribute('data-g-del');
    const g = db.grabs.find(x=>x.id===id);
    if(!g) return;
    if(!confirm('Trinti greiferį: '+(g.label||g.id)+'?')) return;

    const ok = await deleteGrabFromSupabase(id);
    if(!ok){
      alert('Nepavyko ištrinti greiferio iš Supabase');
      return;
    }

    db.grabs = db.grabs.filter(x=>x.id!==id);
    saveDB_local(db);
    render();
  };
});
}

function bindAdminTasks(){
  document.querySelectorAll('[data-admin-group]').forEach(el => {
    el.onclick = () => {
      const key = el.getAttribute('data-admin-group');
      db.session.adminCollapsed[key] = !db.session.adminCollapsed[key];
      saveDB_local(db);
      render();
    };
  });

  const eqSearch = document.getElementById('tEquipSearch');
  const eqSelect = document.getElementById('tEquip');

  if(eqSearch && eqSelect){
    const allOpts = Array.from(eqSelect.options).map(o => ({
      value: o.value,
      text: o.textContent || ''
    }));

    function applyEquipFilter(){
      const q = (eqSearch.value || '').trim().toLowerCase();

      eqSelect.innerHTML = '';
      allOpts
        .filter(o => !q || o.text.toLowerCase().includes(q))
        .forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.value;
          opt.textContent = o.text;
          eqSelect.appendChild(opt);
        });

      if(eqSelect.options.length) eqSelect.selectedIndex = 0;
    }

    eqSearch.addEventListener('input', applyEquipFilter);
    applyEquipFilter();
  }

  document.querySelectorAll('[data-wait]').forEach(b=>{
    b.onclick = ()=>{
      const id = b.getAttribute('data-wait');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      const card = b.closest('.card');
      const ta = card ? card.querySelector('.adminWaitComment') : null;
      const comment = ta ? safeTrim(ta.value) : '';

      if(!t.progressLog) t.progressLog = [];

      if(comment){
        t.progressLog.push({
          date: fmt(Date.now()),
          byId: currentUser()?.id || null,
          byName: currentUser()?.display || currentUser()?.username || 'Vadovas',
          text: '[Laukianti] ' + comment
        });
      }

      updateTaskInSupabase(t.id, {
        status: 'Laukianti',
        progressLog: t.progressLog || []
      }).then(updatedTask => {
        if(!updatedTask){
          alert('Nepavyko pakeisti į laukiančią');
          return;
        }

        const idx = db.tasks.findIndex(x => x.id === t.id);
        if(idx >= 0) db.tasks[idx] = updatedTask;

        saveDB_local(db);
        render();
      });
    };
  });

  document.querySelectorAll('[data-reopen]').forEach(b=>{
    b.onclick = ()=>{
      const id = b.getAttribute('data-reopen');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      updateTaskInSupabase(t.id, {
        status: 'Nauja',
        progressLog: t.progressLog || []
      }).then(updatedTask => {
        if(!updatedTask){
          alert('Nepavyko aktyvuoti darbui');
          return;
        }

        const idx = db.tasks.findIndex(x => x.id === t.id);
        if(idx >= 0) db.tasks[idx] = updatedTask;

        saveDB_local(db);
        render();
      });
    };
  });

  const create = document.getElementById('tCreate');
  if(create){
    create.onclick = ()=>{
      const equipId = document.getElementById('tEquip').value;
      const title = safeTrim(document.getElementById('tTitle').value) || 'Užduotis';
      const shared = document.getElementById('tShared').checked;
      const sel = document.getElementById('tAssign');
      let assignedTo = [];

      if(!shared && sel){
        for(let i=0; i<sel.options.length; i++){
          if(sel.options[i].selected) assignedTo.push(sel.options[i].value);
        }
      }

      const newTask = {
        equipId,
        title,
        status: 'Nauja',
        assignedTo,
        shared,
        source: 'admin',
        createdAt: Date.now(),
        createdBy: currentUser()?.display || currentUser()?.username || 'Admin',
        createdById: currentUser()?.id || null,
        createdByRole: currentUser()?.role || 'admin'
      };

      createTaskInSupabase(newTask).then(savedTask => {
        if(!savedTask){
          alert('Nepavyko išsaugoti užduoties į Supabase');
          return;
        }

        db.tasks.unshift(savedTask);
        saveDB_local(db);
        render();
      });
    };
  }

  document.querySelectorAll('[data-st]').forEach(b=>{
    b.onclick = ()=>{
      const [id, st] = b.getAttribute('data-st').split('|');
      const t = db.tasks.find(x=>x.id===id);
      if(!t) return;

      updateTaskInSupabase(t.id, {
        status: st,
        progressLog: t.progressLog || [],
        seenBy: t.seenBy || {}
      }).then(updatedTask => {
        if(!updatedTask){
          alert('Nepavyko atnaujinti statuso');
          return;
        }

        const idx = db.tasks.findIndex(x => x.id === t.id);
        if(idx >= 0) db.tasks[idx] = updatedTask;

        saveDB_local(db);
        render();
      });
    };
  });

document.querySelectorAll('[data-finish]').forEach(b=>{
  b.onclick = async ()=>{
    const id = b.getAttribute('data-finish');
    const t = db.tasks.find(x=>x.id===id);
    if(!t) return;

    const updatedTask = await updateTaskInSupabase(t.id, {
      status: 'Laukia patvirtinimo',
      progressLog: t.progressLog || []
    });

    if(!updatedTask){
      alert('Nepavyko užbaigti užduoties');
      return;
    }

    if(db.session.opRunningByEquip && db.session.opRunningByEquip[t.equipId] === t.id){
      delete db.session.opRunningByEquip[t.equipId];
    }

const savedApproval = await createApprovalInSupabase({
  taskId: updatedTask.id,

});

    if(!savedApproval){
      alert('Nepavyko sukurti patvirtinimo.');
      return;
    }

    const idx = db.tasks.findIndex(x => x.id === t.id);
    if(idx >= 0) db.tasks[idx] = updatedTask;

  };
});

function bindAdminApprovals(){
  document.querySelectorAll('[data-ok]').forEach(b=>{
    b.onclick = async ()=>{
      const id = b.getAttribute('data-ok');
      const idx = db.approvals.findIndex(x=>x.id===id);
      if(idx < 0) return;

      const a = db.approvals[idx];

      let progressLog = [];
      if(a.taskId){
        const tTask = db.tasks.find(x=>x.id===a.taskId);
        if(tTask && tTask.progressLog){
          progressLog = tTask.progressLog.slice();
        }
      }

const savedCompleted = await createCompletedInSupabase({
  equipId: a.equipId,
  title: a.issue,
  date: a.date,
  durationMin: a.durationMin || 0,
  doneBy: a.doneBy,
  doneById: a.doneById,
  role: (a.role === 'mechanikas' ? 'mechanic' : 'operator'),
  comment: a.comment || '',
  helpers: a.helpers || [],
  progressLog: progressLog
});

      if(!savedCompleted){
        alert('Nepavyko perkelti į istoriją.');
        return;
      }

      const deleted = await deleteApprovalFromSupabase(a.id);
      if(!deleted){
        alert('Nepavyko pašalinti patvirtinimo.');
        return;
      }

      if(a.taskId){
        const t = db.tasks.find(x=>x.id===a.taskId);
        if(t){
          const updatedTask = await updateTaskInSupabase(t.id, {
            status: 'Užbaigta',
            progressLog: t.progressLog || []
          });
          if(updatedTask){
            const tIdx = db.tasks.findIndex(x=>x.id===t.id);
            if(tIdx >= 0) db.tasks[tIdx] = updatedTask;
          }
        }
      }

      db.approvals.splice(idx,1);
      db.completed.unshift(savedCompleted);
      render();
    };
  });

document.querySelectorAll('[data-no]').forEach(b=>{
  b.onclick = async ()=>{
    const id = b.getAttribute('data-no');
    const idx = db.approvals.findIndex(x=>x.id===id);
    if(idx < 0) return;

    const a = db.approvals[idx];

    const deleted = await deleteApprovalFromSupabase(a.id);
    if(!deleted){
      alert('Nepavyko pašalinti patvirtinimo.');
      return;
    }

    if(a.taskId){
      const oldTask = db.tasks.find(x=>x.id===a.taskId);

      if(oldTask){
        const updatedTask = await updateTaskInSupabase(oldTask.id, {
          status: 'Nauja',
          progressLog: oldTask.progressLog || []
        });

        if(!updatedTask){
          alert('Nepavyko grąžinti senos užduoties.');
          return;
        }

        const tIdx = db.tasks.findIndex(x=>x.id===oldTask.id);
        if(tIdx >= 0) db.tasks[tIdx] = updatedTask;
      }
    } else {
      const savedTask = await createTaskInSupabase({
        equipId: a.equipId,
        title: 'Grąžinta: ' + a.issue,
        status: 'Nauja',
        assignedTo: [],
        shared: true,
        source: 'admin',
        createdAt: Date.now(),
        createdBy: currentUser()?.display || currentUser()?.username || 'Admin',
        createdById: currentUser()?.id || null,
        createdByRole: currentUser()?.role || 'admin'
      });

      if(!savedTask){
        alert('Nepavyko grąžinti užduoties.');
        return;
      }

      db.tasks.unshift(savedTask);
    }

    db.approvals.splice(idx,1);
    render();
  };
});
}

/* HISTORY – helper kortelės */
function historyCards(items){
  const sorted = items.slice().sort((a,b)=> (a.date||'') < (b.date||'') ? 1 : -1);

  return sorted.map(c=>{
    const baseInfo = `
      <div class="muted">${escapeHtml(labelEquip(c.equipId))} • ${escapeHtml(c.date||'')}</div>
      <b>${escapeHtml(c.title||'')}</b>
      <div class="muted" style="font-size:13px">
        Atliko: ${escapeHtml(c.doneBy||'—')} (${escapeHtml(c.role||'—')})
        ${c.durationMin ? ' • Trukmė: '+escapeHtml(fmtMinutes(c.durationMin)) : ''}
      </div>
      ${c.comment ? `<div style="margin-top:4px">${escapeHtml(c.comment||'')}</div>` : ''}
      ${(c.helpers||[]).length
        ? `<div class="muted" style="font-size:12px;margin-top:2px">Padėjo: ${escapeHtml(c.helpers.map(userDisplay).join(', '))}</div>`
        : ''
      }
    `;
    const prog = c.progressLog || [];
    const progHtml = prog.length ? `
      <div class="muted" style="margin-top:6px;font-size:12px">
        Komentarų istorija:
        ${prog.map(p=>`
          <div>• ${escapeHtml(p.date||'')} — ${escapeHtml(p.byName||'')} : ${escapeHtml(p.text||'')}</div>
        `).join('')}
      </div>
    ` : '';
    return `<div class="card">${baseInfo}${progHtml}</div>`;
  }).join('');
}

function bindAdminHistory(){
  const eqSel = document.getElementById('hEquip');
  const fromEl = document.getElementById('hFrom');
  const toEl   = document.getElementById('hTo');
  const body   = document.getElementById('hBody');
  const fBtn   = document.getElementById('hFilter');
  const cBtn   = document.getElementById('hClear');

  if(!body) return;

  function applyFilter(){
    const eq   = eqSel ? eqSel.value : '';
    const from = fromEl ? fromEl.value : '';
    const to   = toEl ? toEl.value : '';

    let items = (db.completed || []).slice();

    items = items.filter(c=>{
      if(eq && c.equipId !== eq) return false;
      if(from && (!c.date || c.date < from)) return false;
      if(to   && (!c.date || c.date > to))   return false;
      return true;
    });

    body.innerHTML = historyCards(items);
  }

  if(fBtn) fBtn.onclick = applyFilter;

  if(cBtn){
    cBtn.onclick = ()=>{
      if(eqSel) eqSel.value = '';
      if(fromEl) fromEl.value = '';
      if(toEl) toEl.value = '';
      applyFilter();
    };
  }
}
function getChecklistForEquip(eid){

function operatorChecklistDefaults(){
  return [
    'Variklio tepalas','Hidraulikos tepalas','Greičių dėžės tepalas','Aušinimo skystis',
    'Langų apiplovimo skystis','Tepimo bakelio papildymas','Vizualinė apžiūra: mašinos',

function ensureOperatorData(){
  if(!db.session) db.session = {};
  if(!db.session.opView) db.session.opView = 'home';
    // PRISKIRIAM TECHNIKĄ
// 🔒 TECHNIKA PRIRIŠTA PRIE PLANŠETĖS


  if(!db.session.opRunningByEquip) db.session.opRunningByEquip = {}; // equipId -> taskId

  // NAUJA: per-technikų checklist’ai
  if(!db.checklistsByEquip) db.checklistsByEquip = {};

  // senas laukas - kad nesulūžtų sena info (jei buvo)
  if(db.checklistFields && Array.isArray(db.checklistFields) && db.checklistFields.length){
    db.checklistsByEquip._default = db.checklistFields.slice();
    delete db.checklistFields;
  }

  if(!db.checklistsByEquip._default || !db.checklistsByEquip._default.length){
    db.checklistsByEquip._default = operatorChecklistDefaults();
  }

  if(!db.plans) db.plans = {}; // plans[equipId] = [{id,type,at,note}]
}

function getChecklistFieldsFor(eid){
  if(!db.checklistsByEquip) db.checklistsByEquip = {};

  const byEquip = db.checklistsByEquip;

  // jei konkrečiai technikai yra savo sąrašas – naudojam jį
  if(byEquip[eid] && Array.isArray(byEquip[eid]) && byEquip[eid].length){
    return byEquip[eid];
  }

  // kitaip – default
  if(byEquip._default && Array.isArray(byEquip._default) && byEquip._default.length){
    return byEquip._default;
  }

  // visiškai „ant plyno“ – fallback į seną funkciją
  return operatorChecklistDefaults();
}

  function collectAll(){
    const rows=[];
    Object.keys(db.lube||{}).forEach(assetId=>{
      (db.lube[assetId]||[]).forEach(r=> rows.push({assetId, ...r}));
    });
    rows.sort((a,b)=> (a.date < b.date ? 1 : -1));
    return rows;
  }

  if(btn){
    btn.onclick = async ()=>{
      if(!db.lube) db.lube = {};

      const assetId = safeTrim(document.getElementById('mLubeAsset')?.value || '');
      const note = safeTrim(document.getElementById('mLubeNote')?.value || '');

      if(!assetId){
        alert('Pasirink objektą.');
        return;
      }

      const savedLube = await createLubeRecordInSupabase({
        assetId,
        date: today(),
        by: (user.display||user.username),
        byId: user.id,
        note
      });

      if(!savedLube){
        alert('Nepavyko išsaugoti tepimo.');
        return;
      }

      if(!db.lube[assetId]) db.lube[assetId] = [];
      db.lube[assetId].push({
        id: savedLube.id,
        date: savedLube.date,
        by: savedLube.by,
        byId: savedLube.byId,
        note: savedLube.note
      });

      const inp = document.getElementById('mLubeNote');
      if(inp) inp.value = '';

      rebuildTable(collectAll().slice(0,60));
    };
  }

  if(fBtn){
    fBtn.onclick = ()=>{
      const from = document.getElementById('lFrom')?.value || '';
      const to   = document.getElementById('lTo')?.value || '';

      const rows = [];
      Object.keys(db.lube||{}).forEach(assetId=>{
        (db.lube[assetId]||[]).forEach(r=>{
          if(from && r.date < from) return;
          if(to && r.date > to) return;
          rows.push({assetId, ...r});
        });
      });

      rows.sort((a,b)=> (a.date < b.date ? 1 : -1));
      rebuildTable(rows);
    };
  }

  if(cBtn){
    cBtn.onclick = ()=>{
      const f=document.getElementById('lFrom'); if(f) f.value='';
      const t=document.getElementById('lTo'); if(t) t.value='';
      rebuildTable(collectAll().slice(0,60));
    };
  }
}

setInterval(async () => {
  if(!db) return;

  const isLoggedIn = !!(db.session && db.session.userId);
  if(!isLoggedIn) return;

  const currentRole = currentUser()?.role || '';
  const opView = db.session?.opView || '';
  const mechView = db.session?.mechView || '';
  const adminView = db.session?.adminView || '';

  const isTypingSensitive =
    (currentRole === 'operator' && (opView === 'check' || opView === 'repair' || opView === 'history' || opView === 'quicknote')) ||
    (currentRole === 'mechanic' && mechView === 'tasks') ||
    (currentRole === 'admin' && (adminView === 'tasks' || adminView === 'notes' || adminView === 'users' || adminView === 'equip' || adminView === 'grabs'));

  const oldState = JSON.stringify({
    tasks: db.tasks || [],
    taskFiles: db.taskFiles || [],
    users: db.users || [],
    equipment: db.equipment || [],
    grabs: db.grabs || [],
    notes: db.notes || [],
    approvals: db.approvals || [],
    completed: db.completed || [],
    lube: db.lube || {},
    dailyChecks: db.dailyChecks || []
  });

  const usersFromCloud = await loadUsersFromSupabase();
  if(usersFromCloud.length) db.users = usersFromCloud;

  const tasksFromCloud = await loadTasksFromSupabase();
  db.tasks = tasksFromCloud || [];

  const equipmentFromCloud = await loadEquipmentFromSupabase();
  if(equipmentFromCloud.length) db.equipment = equipmentFromCloud;

  const grabsFromCloud = await loadGrabsFromSupabase();
  if(grabsFromCloud.length) db.grabs = grabsFromCloud;

  db.notes = await loadNotesFromSupabase();
  db.taskFiles = await loadTaskFilesFromSupabase();
  db.approvals = await loadApprovalsFromSupabase();
  db.completed = await loadCompletedFromSupabase();
  db.lube = await loadLubeFromSupabase();
  db.dailyChecks = await loadDailyChecksFromSupabase();

  const newState = JSON.stringify({
    tasks: db.tasks || [],
    taskFiles: db.taskFiles || [],
    users: db.users || [],
    equipment: db.equipment || [],
    grabs: db.grabs || [],
    notes: db.notes || [],
    approvals: db.approvals || [],
    completed: db.completed || [],
    lube: db.lube || {},
    dailyChecks: db.dailyChecks || []
  });

  if(oldState !== newState && !isTypingSensitive){
    render();
  }
}, 3000);

boot();
</script>
